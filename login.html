<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول / الانضمام - DoctorForMe</title>
    <style>
        :root {
            --primary-color: #2a85ff;
            --primary-hover: #0066e2;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            box-sizing: border-box;
        }

        .auth-container {
            max-width: 550px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; color: var(--primary-color); margin-bottom: 25px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        .tab-btn { flex: 1; background: #e2e8f0; color: #4a5568; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .tab-btn.active { background: var(--primary-color); color: white; }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #4a5568; }
        input[type="text"], input[type="password"], input[type="tel"], select {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 15px; background-color: #f8fafc;
        }
        input:focus, select:focus { border-color: var(--primary-color); }

        .show-password-container { display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer; user-select: none; }
        .show-password-container input { width: auto; cursor: pointer; }
        .show-password-container label { margin: 0; font-size: 14px; color: #718096; cursor: pointer; }

        .clinic-section {
            background: #f8fafc; border: 1px dashed var(--primary-color); padding: 15px; border-radius: 8px; margin-top: 15px; position: relative;
        }
        .remove-clinic-btn {
            position: absolute; top: 10px; left: 10px; background: #ff4d4d; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        .btn-add-clinic {
            background: #e2e8f0; color: #4a5568; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; margin-top: 10px; display: inline-block; width: auto;
        }

        button.btn-submit {
            width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: background-color 0.2s;
        }
        button.btn-submit:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>منصة DoctorForMe الطبية</h2>
        
        <div class="tabs">
            <button class="tab-btn active" id="tabLoginBtn" onclick="switchAuthTab('login')">🔑 تسجيل الدخول</button>
            <button class="tab-btn" id="tabRegisterBtn" onclick="switchAuthTab('register')">👨‍⚕️ انضمام طبيب جديد</button>
        </div>

        <!-- 1. نموذج تسجيل الدخول -->
        <div id="loginForm" class="auth-form active">
            <label for="loginPhone">رقم الهاتف:</label>
            <input type="tel" id="loginPhone" placeholder="اكتب رقم هاتفك المسجل...">

            <label for="loginPassword">كلمة السر:</label>
            <input type="password" id="loginPassword" placeholder="اكتب كلمة السر الخاصة بك...">
            
            <!-- ميزة إظهار كلمة السر المضافة -->
            <div class="show-password-container">
                <input type="checkbox" id="showLoginPass" onclick="togglePasswordVisibility('loginPassword')">
                <label for="showLoginPass">إظهار كلمة السر</label>
            </div>

            <button class="btn-submit" onclick="handleLogin()">تسجيل الدخول الفوري</button>
        </div>

        <!-- 2. نموذج تسجيل طبيب جديد متطور -->
        <div id="registerForm" class="auth-form">
            <label for="docName">اسم الطبيب بالكامل:</label>
            <input type="text" id="docName" placeholder="الاسم كما يظهر للمرضى مسبوقاً بـ د.">

            <!-- تحديث وإضافة كافة التخصصات المطلوبة -->
            <label for="docSpecialty">التخصص الطبي:</label>
            <select id="docSpecialty">
                <option value="">-- اختر التخصص بدقة --</option>
                <option value="أسنان">🦷 أسنان</option>
                <option value="عيون">👁️ عيون</option>
                <option value="باطنة">🩺 باطنة</option>
                <option value="أطفال">👶 أطفال</option>
                <option value="جلدية">✨ جلدية</option>
                <option value="عظام">🦴 عظام</option>
                <option value="نساء وتوليد">🤰 نساء وتوليد</option>
                <option value="قلب وأوعية دموية">❤️ قلب وأوعية دموية</option>
                <option value="مخ وأعصاب">🧠 مخ وأعصاب</option>
                <option value="جراحة عامة">🔪 جراحة عامة</option>
                <option value="أنف وأذن وحنجرة">👂 أنف وأذن وحنجرة</option>
                <option value="نفسي">🌱 طب نفسي</option>
            </select>

            <label for="docPhone">رقم هاتف العيادة / الطبيب المباشر:</label>
            <input type="tel" id="docPhone" placeholder="مثال: 01xxxxxxxxx">

            <label for="docPassword">إنشاء كلمة سر للحساب:</label>
            <input type="password" id="docPassword" placeholder="اختر كلمة سر قوية...">
            
            <!-- ميزة إظهار كلمة السر للتسجيل -->
            <div class="show-password-container">
                <input type="checkbox" id="showRegPass" onclick="togglePasswordVisibility('docPassword')">
                <label for="showRegPass">إظهار كلمة السر</label>
            </div>

            <h3 style="margin-top: 25px; font-size: 16px; color: var(--primary-color); border-bottom: 1px solid #edf2f7; padding-bottom: 5px;">🏥 بيانات العيادات ومواعيد العمل (نظام العيادات المتعددة)</h3>
            <div id="clinicsContainer">
                <!-- سيتم توليد كتل العيادات هنا ديناميكياً -->
            </div>
            <button type="button" class="btn-add-clinic" onclick="addClinicBlock()">➕ إضافة عيادة / فرع آخر</button>

            <button class="btn-submit" onclick="handleDoctorRegister()">تقديم طلب الانضمام للمراجعة</button>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzXXXXXXXXXXXXXXX", 
            authDomain: "doctorforme-62aaf.firebaseapp.com",
            projectId: "doctorforme-62aaf",
            storageBucket: "doctorforme-62aaf.appspot.com",
            messagingSenderId: "121506902078",
            appId: "1:121506902078:web:7f15e8da771bd973a96cef" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let clinicCount = 0;

        // دالة التبديل بين التبويبات
        window.switchAuthTab = function(tab) {
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('tabLoginBtn').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegisterBtn').classList.toggle('active', tab === 'register');
        }

        // 1. حل مشكلة إظهار وإخفاء كلمة السر الذكي
        window.togglePasswordVisibility = function(inputId) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        }

        // توليد حقول عيادة جديدة ديناميكياً بالتنسيق التكراري المتطور (Array)
        window.addClinicBlock = function() {
            clinicCount++;
            const container = document.getElementById('clinicsContainer');
            const block = document.createElement('div');
            block.className = 'clinic-section';
            block.id = `clinic_block_${clinicCount}`;
            block.innerHTML = `
                ${clinicCount > 1 ? `<button type="button" class="remove-clinic-btn" onclick="removeClinicBlock(${clinicCount})">حذف X</button>` : ''}
                <h4 style="margin-top:0; color:#4a5568;">العيادة رقم (${clinicCount})</h4>
                
                <label>العنوان الكامل للمحافظة والمنطقة:</label>
                <input type="text" class="clinic-address" placeholder="مثال: القاهرة، مدينة نصر، شارع عباس العقاد بجوار..." required>
                
                <label>رابط موقع العيادة على Google Maps (إن وجد):</label>
                <input type="text" class="clinic-map" placeholder="ضع رابط مشاركة موقع العيادة من خرائط جوجل...">

                <label>أيام ومواعيد العمل بالتفصيل:</label>
                <input type="text" class="clinic-hours" placeholder="مثال: السبت والإثنين والأربعاء من 6 م إلى 10 م" required>
            `;
            container.appendChild(block);
        }

        window.removeClinicBlock = function(id) {
            const block = document.getElementById(`clinic_block_${id}`);
            if(block) block.remove();
        }

        // 2. معالجة تسجيل طبيب جديد بالنظام المعدل والمتوافق مع اللوحة والمريض
        window.handleDoctorRegister = async function() {
            const name = document.getElementById('docName').value.trim();
            const specialty = document.getElementById('docSpecialty').value;
            const phone = document.getElementById('docPhone').value.trim();
            const password = document.getElementById('docPassword').value;

            if(!name || !specialty || !phone || !password) {
                alert("برجاء ملء كافة البيانات الأساسية للطبيب أولاً.");
                return;
            }

            // جمع بيانات العيادات المتعددة وبنائها في مصفوفة كائنات مجهزة
            const clinicBlocks = document.querySelectorAll('.clinic-section');
            const clinicsArray = [];

            if(clinicBlocks.length === 0) {
                alert("يجب إضافة عيادة واحدة على الأقل لإتمام التسجيل.");
                return;
            }

            let isValidClinics = true;
            clinicBlocks.forEach(block => {
                const address = block.querySelector('.clinic-address').value.trim();
                const mapUrl = block.querySelector('.clinic-map').value.trim();
                const workingHours = block.querySelector('.clinic-hours').value.trim();

                if(!address || !workingHours) {
                    isValidClinics = false;
                    return;
                }

                clinicsArray.push({
                    address: address,
                    map_url: mapUrl,
                    working_hours: workingHours
                });
            });

            if(!isValidClinics) {
                alert("برجاء إدخال العنوان والمواعيد لكل العيادات التي قمت بإضافتها.");
                return;
            }

            try {
                // حفظ المستند بالهيكل الجديد المتناسق مع بقية التطبيق
                await db.collection("doctors").add({
                    name: name,
                    specialty: specialty,
                    phone: phone,
                    password: password, 
                    role: "doctor",
                    status: "pending", // معلق بانتظار تفعيل الأدمن برابط الصورة
                    image_url: "", // الأدمن سيرفعها لاحقاً
                    clinics: clinicsArray, // المصفوفة التكرارية المحدثة
                    created_at: new Date().toISOString()
                });

                alert("🎉 تم تقديم طلب انضمامك للمنصة بنجاح!\nجاري مراجعة البيانات من قبل الإدارة وسيتم تفعيل حسابك ورفع صورتك خلال ساعات.");
                location.reload();

            } catch (error) {
                alert("حدث خطأ تقني أثناء معالجة طلب التسجيل: " + error.message);
            }
        }

        // كود معالجة تسجيل الدخول للمريض والأدمن والدكتور
        window.handleLogin = async function() {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value;

            if(!phone || !password) {
                alert("برجاء إدخال رقم الهاتف وكلمة السر.");
                return;
            }

            // مثال مبسط للتحقق من الأدمن
            if(phone === "01000000000" && password === "admin123") {
                localStorage.setItem('user_role', 'admin');
                localStorage.setItem('user_name', 'مدير النظام');
                window.location.href = 'admin_panel.html';
                return;
            }

            try {
                // التحقق من كولكشن الدكاترة أولاً
                const docSnapshot = await db.collection("doctors")
                                            .where("phone", "==", phone)
                                            .where("password", "==", password)
                                            .get();

                if(!docSnapshot.empty) {
                    const docData = docSnapshot.docs[0].data();
                    if(docData.status === 'pending') {
                        alert("حسابك مسجل بالفعل ولكن ما زال قيد مراجعة وتفعيل الإدارة. شكراً لطلبك وفي انتظارك!");
                        return;
                    }
                    localStorage.setItem('user_role', 'doctor');
                    localStorage.setItem('user_id', docSnapshot.docs[0].id);
                    localStorage.setItem('user_name', docData.name);
                    alert(`مرحباً بك دكتور ${docData.name}`);
                    window.location.href = 'doctor_dashboard.html'; 
                    return;
                }

                // إذا لم يكن دكتور، نتحقق من كولكشن المرضى (patients) بنفس الأسلوب...
                alert("بيانات الدخول غير صحيحة، أو الحساب غير مسجل.");

            } catch (error) {
                alert("خطأ في الاتصال بالخادم: " + error.message);
            }
        }

        // توليد أول كتلة عيادة تلقائياً عند فتح الصفحة
        addClinicBlock();
    </script>
</body>
</html>
