<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة DoctorForMe الطبية - دخول / تسجيل</title>
    <style>
        :root {
            --primary-color: #2a85ff;
            --primary-hover: #0066e2;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 90vh;
        }

        .auth-container {
            width: 100%; max-width: 400px;
            background: var(--card-bg); padding: 30px;
            border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; color: var(--primary-color); margin-top: 0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-size: 16px; font-weight: bold; cursor: pointer; color: #718096; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { color: white; background-color: var(--primary-color); }

        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #4a5568; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 15px; }
        input:focus, select:focus { border-color: var(--primary-color); }

        button[type="submit"] { width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: background-color 0.2s; }
        button[type="submit"]:hover { background-color: var(--primary-hover); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">🔑 تسجيل الدخول</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">👤 إنشاء حساب جديد</button>
        </div>

        <form id="loginForm">
            <h2>مرحباً بك مجدداً</h2>
            <label for="loginPhone">رقم الهاتف:</label>
            <input type="tel" id="loginPhone" placeholder="مثال: 01xxxxxxxxx" required>

            <label for="loginPassword">كلمة السر:</label>
            <input type="password" id="loginPassword" placeholder="********" required>

            <button type="submit">تسجيل الدخول الفوري</button>
        </form>

        <form id="registerForm" class="hidden">
            <h2>إنشاء حساب جديد</h2>
            <label for="regName">الاسم بالكامل:</label>
            <input type="text" id="regName" placeholder="اكتب اسمك الثلاثي" required>

            <label for="regPhone">رقم الهاتف:</label>
            <input type="tel" id="regPhone" placeholder="مثال: 01xxxxxxxxx" required>

            <label for="regPassword">كلمة السر:</label>
            <input type="password" id="regPassword" placeholder="اكتب كلمة سر قوية" required>

            <label for="userRole">نوع الحساب:</label>
            <select id="userRole" onchange="toggleDoctorFields()">
                <option value="patient">مريض (حجز فوري)</option>
                <option value="doctor">طبيب (انضمام للمنصة)</option>
            </select>

            <div id="doctorFields" class="hidden">
                <label for="docSpecialty">التخصص:</label>
                <select id="docSpecialty">
                    <option value="أطفال">أطفال</option>
                    <option value="أسنان">أسنان</option>
                    <option value="عيون">عيون</option>
                    <option value="باطنة">باطنة</option>
                    <option value="جلدية">جلدية</option>
                </select>

                <label for="docAddress">عنوان العيادة بالتفصيل:</label>
                <input type="text" id="docAddress" placeholder="مثال: المحلة - شارع البحر">
            </div>

            <button type="submit">تسجيل الحساب وتفعيله</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

     <script>
     const firebaseConfig = {
    apiKey: "AIzaSyAzXXXXXXXXXXXXXXX", // دي الوحيدة اللي هتلاقيها مكتوبة واضحة أول ما تضغط على DoctorForMe Web
    authDomain: "doctorforme-62aaf.firebaseapp.com",
    projectId: "doctorforme-62aaf",
    storageBucket: "doctorforme-62aaf.appspot.com",
    messagingSenderId: "121506902078",
    appId: "1:121506902078:web:7f15e8da771bd973a96cef" // هتظهرلك كاملة لما تضغط على الويب
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. ميزة الدخول التلقائي (Auto-Login) بمجرد فتح الصفحة
        document.addEventListener("DOMContentLoaded", () => {
            const currentRole = localStorage.getItem('user_role');
            const currentPhone = localStorage.getItem('user_phone');

            // لو الهاتف مسجل دخول مسبقاً، يوجهه لصفحته فوراً بدون فورم
            if (currentRole && currentPhone) {
                if (currentRole === 'admin') {
                    window.location.href = 'admin_panel.html';
                } else if (currentRole === 'doctor') {
                    window.location.href = 'doctor_dashboard.html';
                } else if (currentRole === 'patient') {
                    window.location.href = 'index.html'; 
                }
            }
        });

        // التبديل السلس بين التبويبات
        function switchTab(type) {
            if(type === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerTab').classList.add('active');
                toggleDoctorFields(); // للتأكد من حالة الحقول
            }
        }

        // إظهار/إخفاء حقول الطبيب بناءً على الاختيار داخل القائمة
        function toggleDoctorFields() {
            const role = document.getElementById('userRole').value;
            const docFields = document.getElementById('doctorFields');
            if(role === 'doctor') {
                docFields.classList.remove('hidden');
            } else {
                docFields.classList.add('hidden');
            }
        }

        // منطق إنشاء حساب جديد (مريض أو طبيب)
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('userRole').value;

            try {
                // التأكد من عدم تكرار رقم التليفون في السيستم
                const userCheck = await db.collection("users").where("phone", "==", phone).get();
                if(!userCheck.empty) {
                    alert("رقم الهاتف هذا مسجل بالفعل لحساب آخر!");
                    return;
                }

                let userData = {
                    name: name,
                    phone: phone,
                    password: password,
                    role: role,
                    created_at: new Date().toISOString()
                };

                if(role === 'doctor') {
                    userData.status = 'pending'; // الطبيب ينتظر موافقة الأدمن
                    userData.specialty = document.getElementById('docSpecialty').value;
                    userData.address = document.getElementById('docAddress').value.trim();
                } else {
                    userData.status = 'active'; // المريض شغال ومفعّل تلقائياً
                }

                await db.collection("users").add(userData);
                alert(role === 'doctor' ? "تم تسجيل حسابك كطبيب! وهو قيد مراجعة الإدارة حالياً للتفعيل." : "تم إنشاء حسابك كمريض بنجاح! يمكنك الآن تسجيل الدخول.");
                switchTab('login');

            } catch (error) {
                alert("حدث خطأ أثناء التسجيل: " + error.message);
            }
        });

        // منطق تسجيل الدخول وحفظ الجلسة
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const querySnapshot = await db.collection("users")
                                              .where("phone", "==", phone)
                                              .where("password", "==", password)
                                              .get();

                if(querySnapshot.empty) {
                    alert("رقم الهاتف أو كلمة السر غير صحيحة!");
                    return;
                }

                let userDoc = null;
                querySnapshot.forEach(doc => userDoc = doc.data());

                // التحقق لو كان طبيب وحسابه لسه متفعلش
                if(userDoc.role === 'doctor' && userDoc.status === 'pending') {
                    alert("عذراً، حسابك كطبيب ما زال قيد المراجعة من قِبل الإدارة وسيتفعل قريباً.");
                    return;
                }

                // حفظ بيانات الجلسة محلياً على الهاتف لعدم تكرار الدخول
                localStorage.setItem('user_name', userDoc.name);
                localStorage.setItem('user_phone', userDoc.phone);
                localStorage.setItem('user_role', userDoc.role);

                // التوجيه الفوري حسب نوع الحساب
                if(userDoc.role === 'admin') {
                    window.location.href = 'admin_panel.html';
                } else if(userDoc.role === 'doctor') {
                    window.location.href = 'doctor.html';
                } else {
                    window.location.href = 'index.html'; 
                }

            } catch (error) {
                alert("حدث خطأ أثناء تسجيل الدخول: " + error.message);
            }
        });
    </script>
</body>
</html>
