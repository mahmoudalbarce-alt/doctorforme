<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطبيب</title>
    <style>
        :root { --primary: #2a85ff; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h2 { margin: 0; color: var(--primary); }
        .logout-btn { background: #718096; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        /* تصميم الكروت للموبايل والجدول للكمبيوتر */
        .booking-card { background: #fafafa; border: 1px solid #edf2f7; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .booking-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .booking-row span:first-child { font-weight: bold; color: #4a5568; }
        .clinic-tag { background: #e0f2fe; color: #0369a1; padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .badge { padding: 4px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .badge-pending { background: #fef3c7; color: #d97706; }
        .badge-approved { background: #e0f2fe; color: #0369a1; }
        .badge-confirmed { background: #d1fae5; color: #065f46; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }
        
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2 id="welcomeMsg">لوحة تحكم الطبيب</h2>
            <button class="logout-btn" onclick="logout()">🚪 خروج</button>
        </header>

        <div id="bookingsList">
            <p style="text-align: center; color: gray;">جاري تحميل الحجوزات...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. التحقق من تسجيل الدخول
        const doctorId = localStorage.getItem('user_id');
        const doctorName = localStorage.getItem('user_name') || "طبيب";
        
        if (!doctorId) {
            alert("برجاء تسجيل الدخول أولاً كطبيب.");
            window.location.href = 'login.html';
        } else {
            document.getElementById('welcomeMsg').innerText = `دكتور: ${doctorName}`;
        }

        // 2. إعداد الفايربيز
        const firebaseConfig = {
            apiKey: "AIzaSyAzXXXXXXXXXXXXXXX", 
            authDomain: "doctorforme-62aaf.firebaseapp.com",
            projectId: "doctorforme-62aaf",
            storageBucket: "doctorforme-62aaf.appspot.com",
            messagingSenderId: "121506902078",
            appId: "1:121506902078:web:7f15e8da771bd973a96cef" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const bookingsList = document.getElementById('bookingsList');

        // 3. الاستماع للحجوزات بدون ORDER BY لمنع مشاكل الـ Index نهائياً
        function loadBookings() {
            console.log("جاري البحث عن حجوزات للـ ID:", doctorId);
            
            db.collection("bookings")
              .where("doctor_id", "==", doctorId)
              .onSnapshot((snapshot) => {
                  bookingsList.innerHTML = '';
                  console.log("تم تحديث البيانات! عدد الحجوزات المستلمة:", snapshot.size);

                  if (snapshot.empty) {
                      bookingsList.innerHTML = '<p style="text-align: center; color: gray; padding: 20px;">لا توجد حجوزات مسجلة باسمك حتى الآن.</p>';
                      return;
                  }

                  // ترتيب يدوي في المتصفح من الأحدث للأقدم
                  const list = [];
                  snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                  list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

                  list.forEach((booking) => {
                      let statusText = '';
                      let buttons = '';

                      // تحديد شكل الحالة والأزرار
                      if (booking.status === 'pending') {
                          statusText = '<span class="badge badge-pending">قيد الانتظار ⏳</span>';
                          buttons = `
                              <div class="actions">
                                  <button class="btn btn-approve" onclick="approveBooking('${booking.id}')">قبول مبدئي</button>
                                  <button class="btn btn-reject" onclick="rejectBooking('${booking.id}')">رفض الحجز</button>
                              </div>
                          `;
                      } else if (booking.status === 'doctor_approved') {
                          statusText = '<span class="badge badge-approved">بانتظار موافقة الإدارة 📞</span>';
                          buttons = '<p style="color: #2a85ff; font-size: 12px; text-align: center; font-weight: bold;">الحجز معروض الآن على صفحة الإدارة لاتخاذ القرار المالي.</p>';
                      } else if (booking.status === 'confirmed') {
                          statusText = '<span class="badge badge-confirmed">مؤكد نهائياً ✅</span>';
                      } else if (booking.status === 'rejected') {
                          statusText = `<span class="badge badge-rejected">مرفوض ❌</span> <br><small style="color:red">السبب: ${booking.rejection_reason || 'غير محدد'}</small>`;
                      }

                      const card = `
                          <div class="booking-card">
                              <div class="booking-row"><span>اسم المريض:</span> <span>${booking.patient_name}</span></div>
                              <div class="booking-row"><span>رقم الهاتف:</span> <span><a href="tel:${booking.patient_phone}">${booking.patient_phone}</a></span></div>
                              <div class="booking-row"><span>العيادة:</span> <span class="clinic-tag">🏥 ${booking.clinic_address || 'الرئيسية'}</span></div>
                              <div class="booking-row"><span>الحالة:</span> <span>${statusText}</span></div>
                              ${buttons}
                          </div>
                      `;
                      bookingsList.innerHTML += card;
                  });
              }, (error) => {
                  console.error("خطأ في جلب البيانات من فايربيز:", error);
                  bookingsList.innerHTML = `<p style="color:red; text-align:center;">حدث خطأ: ${error.message}</p>`;
              });
        }

        // 4. دالة موافقة الدكتور (تحديث الحالة لـ doctor_approved)
        window.approveBooking = async function(id) {
            try {
                await db.collection("bookings").doc(id).update({
                    status: 'doctor_approved'
                });
                alert("تم قبول الحجز مبدئياً! الحجز انتقل الآن تلقائياً لصفحة الإدارة.");
            } catch (err) {
                alert("فشل تحديث الحجز: " + err.message);
            }
        }

        // 5. دالة الرفض
        window.rejectBooking = async function(id) {
            const reason = prompt("برجاء كتابة سبب الرفض لكي يظهر للمريض والإدارة:");
            if (!reason) return;
            try {
                await db.collection("bookings").doc(id).update({
                    status: 'rejected',
                    rejection_reason: reason
                });
                alert("تم رفض الحجز.");
            } catch (err) {
                alert("فشل رفض الحجز: " + err.message);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        loadBookings();
    </script>
</body>
</html>
