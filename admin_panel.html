<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الشاملة</title>
    <style>
        :root {
            --primary-color: #2a85ff;
            --primary-hover: #0066e2;
            --success-color: #2ecc71;
            --danger-color: #ff4d4d;
            --warning-color: #f1c40f;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .admin-container { max-width: 950px; margin: 30px auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary-color); margin-top: 0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { background: #e2e8f0; color: #4a5568; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; min-width: 140px; text-align: center; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary-color); color: white; }

        .doctor-request-card { background: #f8fafc; border: 2px solid #edf2f7; padding: 20px; border-radius: 12px; margin-bottom: 25px; position: relative; }
        .clinic-item { background: #fff; padding: 10px 15px; border-radius: 8px; border-right: 4px solid var(--primary-color); margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        .badge { position: absolute; top: 20px; left: 20px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-pending { background: #feebc8; color: #c05621; }
        .badge-approved { background: #c6f6d5; color: #22543d; }
        .badge-waiting { background: #e2f0fe; color: #1a56db; }

        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #4a5568; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 15px; }
        input:focus { border-color: var(--primary-color); }
        
        .actions-container { display: flex; gap: 15px; margin-top: 25px; }
        .btn-approve { flex: 2; background-color: var(--success-color); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        .btn-delete { flex: 1; background-color: var(--danger-color); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        button:hover { opacity: 0.9; }
        
        .hint { font-size: 12px; color: #718096; margin-top: 4px; display: block; }
        .no-requests { text-align: center; color: #718096; padding: 40px; font-size: 16px; }

        /* ستايل كروت الحجوزات المقبولة من الدكتور */
        .booking-call-card { background: #fff; border: 2px solid #e2e8f0; border-right: 5px solid var(--warning-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .booking-details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 10px; }
        .detail-box { background: #f8fafc; padding: 10px; border-radius: 8px; font-size: 14px; }
        .btn-call-done { background-color: var(--success-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; display: block; font-size: 15px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>لوحة الإدارة الشاملة - التحكم بالنظام</h2>
        
        <!-- التبويبات المحدثة بثلاث خيارات -->
        <div class="tabs">
            <button class="tab-btn active" id="btnPending" onclick="switchTab('pending')">⏳ طلبات الدكاترة المعلقة</button>
            <button class="tab-btn" id="btnApproved" onclick="switchTab('approved')">✅ الأطباء النشطون</button>
            <button class="tab-btn" id="btnBookings" onclick="switchTab('bookings')">📞 تأكيد الحجوزات المعلقة</button>
        </div>

        <div id="requestsContainer">
            <p class="no-requests">جاري فحص قاعدة البيانات...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzXXXXXXXXXXXXXXX", 
            authDomain: "doctorforme-62aaf.firebaseapp.com",
            projectId: "doctorforme-62aaf",
            storageBucket: "doctorforme-62aaf.appspot.com",
            messagingSenderId: "121506902078",
            appId: "1:121506902078:web:7f15e8da771bd973a96cef" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const requestsContainer = document.getElementById('requestsContainer');
        let currentStatusFilter = 'pending'; 
        let unsubscribeDoctors = null;
        let unsubscribeBookings = null;

        function convertDriveUrl(url) {
            if (!url) return "";
            if (url.includes("drive.google.com")) {
                let id = "";
                if (url.includes("/d/")) {
                    id = url.split('/d/')[1].split('/')[0].split('?')[0];
                } else if (url.includes("id=")) {
                    id = url.split('id=')[1].split('&')[0];
                }
                if (id) {
                    return `https://docs.google.com/uc?export=view&id=${id}`;
                }
            }
            return url;
        }

        window.switchTab = function(status) {
            currentStatusFilter = status;
            
            // إلغاء تفعيل كل الأزرار وتفعيل المحدد
            document.getElementById('btnPending').classList.toggle('active', status === 'pending');
            document.getElementById('btnApproved').classList.toggle('active', status === 'approved');
            document.getElementById('btnBookings').classList.toggle('active', status === 'bookings');
            
            // إيقاف الإنصات القديم لتوفير استهلاك الكاش والـ Read وقراءة المود الجديد
            if (unsubscribeDoctors) { unsubscribeDoctors(); unsubscribeDoctors = null; }
            if (unsubscribeBookings) { unsubscribeBookings(); unsubscribeBookings = null; }

            if (status === 'bookings') {
                listenToApprovedBookings();
            } else {
                listenToDoctorRequests();
            }
        }

        // 1. جلب ومراقبة طلبات الدكاترة المعلقين والنشطين بدقة
        function listenToDoctorRequests() {
            requestsContainer.innerHTML = '<p class="no-requests">جاري فحص قاعدة البيانات...</p>';
            
            unsubscribeDoctors = db.collection("users").where("role", "==", "doctor").onSnapshot((snapshot) => {
                requestsContainer.innerHTML = '';
                
                if (snapshot.empty) {
                    requestsContainer.innerHTML = '<p class="no-requests">👤 لا يوجد أي أطباء مسجلين في النظام حالياً.</p>';
                    return;
                }

                let count = 0;

                snapshot.forEach((doc) => {
                    const doctor = doc.data();
                    
                    // تحسين آلية فحص الحالة لتجنب أخطاء الحروف الكبيرة وتأمين القراءة الصحيحة
                    let doctorStatus = doctor.status ? doctor.status.toLowerCase().trim() : 'pending';
                    const isPending = (doctorStatus === 'pending');
                    
                    if (currentStatusFilter === 'pending' && !isPending) return;
                    if (currentStatusFilter === 'approved' && isPending) return;

                    count++;
                    
                    let clinicsHTML = `
                        <div class="clinic-item">
                            <strong>العيادة الرئيسية:</strong> ${doctor.address || 'غير محدد'} <br>
                            <strong>أيام العمل:</strong> ${doctor.working_days && doctor.working_days.length > 0 ? doctor.working_days.join(' - ') : 'غير محدد'} <br>
                            <strong>ساعات العمل:</strong> من ${doctor.working_hours?.start || 'غير محدد'} إلى ${doctor.working_hours?.end || 'غير محدد'}
                        </div>
                    `;

                    if (doctor.additional_clinics && Array.isArray(doctor.additional_clinics) && doctor.additional_clinics.length > 0) {
                        doctor.additional_clinics.forEach((clinicAddress, index) => {
                            clinicsHTML += `
                                <div class="clinic-item" style="border-right-color: #2ecc71;">
                                    <strong>عيادة إضافية (${index + 1}):</strong> ${clinicAddress}
                                </div>
                            `;
                        });
                    }
                    
                    const card = `
                        <div class="doctor-request-card" id="card_${doc.id}">
                            <span class="badge ${isPending ? 'badge-pending' : 'badge-approved'}">
                                ${isPending ? 'معلق ⏳' : 'نشط ومفعل ✅'}
                            </span>
                            <h3>👨‍⚕️ الطبيب: ${doctor.name}</h3>
                            <p><strong>التخصص:</strong> ${doctor.specialty || 'غير محدد'}</p>
                            <p><strong>رقم الهاتف:</strong> ${doctor.phone || 'غير مسجل'}</p>
                            
                            <h4>🏥 تفاصيل المقرات والعيادات:</h4>
                            ${clinicsHTML}
                            
                            <hr style="border: 0; border-top: 1px solid #edf2f7; margin: 20px 0;">
                            
                            ${isPending ? `
                                <label for="img_${doc.id}">رابط صورة الطبيب من Google Drive (الإدارة):</label>
                                <input type="text" id="img_${doc.id}" placeholder="ضع رابط مشاركة ملف الصورة من الدرايف هنا...">
                                <span class="hint">* ستتولى الإدارة رفع وتأكيد رابط الصورة وتفعيل الحساب فوراً.</span>
                            ` : `
                                <p style="font-size:14px; color:#4a5568;">🔗 <strong>رابط الصورة الحالي:</strong> <a href="${doctor.image_url || '#'}" target="_blank" style="color:var(--primary-color)">عرض الصورة الشخصية 🖼️</a></p>
                            `}
                            
                            <div class="actions-container">
                                ${isPending ? `<button class="btn-approve" onclick="approveAndActivateDoctor('${doc.id}')">✅ اعتماد وتفعيل الحساب</button>` : ''}
                                <button class="btn-delete" style="${!isPending ? 'flex:1;' : ''}" onclick="deleteDoctor('${doc.id}', '${doctor.name}', '${doctor.phone}')">
                                    🗑️ ${isPending ? 'رفض وحذف الطلب' : 'حذف الطبيب نهائياً من المنصة'}
                                </button>
                            </div>
                        </div>
                    `;
                    requestsContainer.innerHTML += card;
                });

                if (count === 0) {
                    requestsContainer.innerHTML = currentStatusFilter === 'pending' 
                        ? '<p class="no-requests">🎉 لا توجد طلبات انضمام معلقة حالياً.</p>'
                        : '<p class="no-requests">👤 لا يوجد أطباء مفعلون حالياً في قاعدة البيانات.</p>';
                }
            });
        }

        // 2. دالة الجلب اللحظي لطلبات الحجوزات المقبولة من الأطباء (doctor_approved)
        function listenToApprovedBookings() {
            requestsContainer.innerHTML = '<p class="no-requests">جاري فحص الحجوزات المقبولة من الأطباء...</p>';

            unsubscribeBookings = db.collection("bookings")
                .where("status", "==", "doctor_approved")
                .onSnapshot((snapshot) => {
                    requestsContainer.innerHTML = '';

                    if (snapshot.empty) {
                        requestsContainer.innerHTML = '<p class="no-requests">📞 لا توجد حجوزات بانتظار اتصال الإدارة وتأكيدها حالياً. كل شيء منتهٍ!</p>';
                        return;
                    }

                    snapshot.forEach((doc) => {
                        const booking = doc.data();
                        
                        let bookingDate = 'غير محدد';
                        if (booking.created_at) {
                            if (typeof booking.created_at.toDate === 'function') {
                                bookingDate = booking.created_at.toDate().toLocaleString('ar-EG');
                            } else {
                                bookingDate = new Date(booking.created_at).toLocaleString('ar-EG');
                            }
                        }

                        const card = `
                            <div class="booking-call-card">
                                <span class="badge badge-waiting">موافقة الطبيب ⏳</span>
                                <h3 style="margin-top: 0; color: #2d3748;">📞 اتصال تأكيد حجز المريض</h3>
                                <p style="color: #4a5568; font-size: 14px;">يرجى الاتصال بالمريض للتنسيق النهائي وتأكيد موعده، ثم اضغط على الزر بالأسفل لتأكيد الحجز على حسابه وحساب طبيبه.</p>
                                
                                <div class="booking-details-grid">
                                    <div class="detail-box">👤 <strong>المريض:</strong> ${booking.patient_name}</div>
                                    <div class="detail-box">📱 <strong>هاتف المريض:</strong> <a href="tel:${booking.patient_phone}" style="color:var(--primary-color); font-weight:bold;">${booking.patient_phone}</a></div>
                                    <div class="detail-box">👨‍⚕️ <strong>الطبيب المعالج:</strong> ${booking.doctor_name}</div>
                                    <div class="detail-box">📍 <strong>العيادة المحددة:</strong> ${booking.clinic_address || 'الرئيسية'}</div>
                                    <div class="detail-box" style="grid-column: 1 / -1; font-size:12px; color: #718096;">📅 تاريخ تقديم الطلب: ${bookingDate}</div>
                                </div>

                                <button class="btn-call-done" onclick="confirmFinalBooking('${doc.id}', '${booking.patient_name}')">
                                    📞 تم الاتصال والتأكيد النهائي للحجز ✅
                                </button>
                            </div>
                        `;
                        requestsContainer.innerHTML += card;
                    });
                });
        }

        // 3. دالة التأكيد النهائي للحجز بعد مكالمة الإدارة
        window.confirmFinalBooking = async function(bookingId, patientName) {
            const isConfirmed = confirm(`هل قمت بالاتصال بالمريض "${patientName}" بالفعل وتريد تأكيد الحجز نهائياً على المنصة؟`);
            if(!isConfirmed) return;

            try {
                await db.collection("bookings").doc(bookingId).update({
                    status: "confirmed"
                });
                alert(`🎉 ممتاز! تم تأكيد حجز المريض "${patientName}" بنجاح وتحديث حالته فوراً.`);
            } catch (error) {
                alert("حدث خطأ أثناء تحديث حالة الحجز: " + error.message);
            }
        }

        // دالة الاعتماد والتفعيل للأطباء الجدد
        window.approveAndActivateDoctor = async function(userId) {
            const rawImageUrl = document.getElementById(`img_${userId}`).value.trim();
            if (!rawImageUrl) {
                alert("برجاء وضع رابط صورة الطبيب من الجوجل درايف أولاً قبل تفعيل الحساب.");
                return;
            }
            const finalImageUrl = convertDriveUrl(rawImageUrl);

            try {
                const userDoc = await db.collection("users").doc(userId).get();
                if (!userDoc.exists) {
                    alert("خطأ: لم يتم العثور على بيانات الطبيب.");
                    return;
                }
                const doctorData = userDoc.data();

                await db.collection("users").doc(userId).update({
                    status: "active",
                    image_url: finalImageUrl
                });

                await db.collection("doctors").add({
                    user_id: userId, 
                    name: doctorData.name.startsWith("د.") ? doctorData.name : "د. " + doctorData.name,
                    phone: doctorData.phone,
                    specialty: doctorData.specialty,
                    image_url: finalImageUrl,
                    rating: "5.0",
                    clinic_address: {
                        full_address: doctorData.address,
                        map_url: ""
                    },
                    additional_clinics: doctorData.additional_clinics || [], 
                    working_days: doctorData.working_days || [],
                    working_hours: doctorData.working_hours || { start: "14:00", end: "22:00" }
                });

                alert(`تم تفعيل حساب الطبيب "${doctorData.name}" بنجاح ونقله لدليل الأطباء للمرضى!`);
            } catch (error) {
                alert("حدث خطأ أثناء تفعيل الحساب: " + error.message);
            }
        }

        // دالة الحذف الآمنة للطبيب
        window.deleteDoctor = async function(userId, doctorName, doctorPhone) {
            const isConfirmed = confirm(`تنبيه حرج للإدارة 🚨\n\nهل أنت متأكد تماماً من حذف الطبيب "${doctorName}" بشكل نهائي ومطلق من قاعدة البيانات؟\n(هذا الإجراء سيمسح حسابه من الدليل ومن لوحة الدخول تماماً)`);
            if (!isConfirmed) return;

            try {
                await db.collection("users").doc(userId).delete();
                
                let doctorQuery = null;
                if (doctorPhone) {
                    doctorQuery = await db.collection("doctors").where("phone", "==", doctorPhone).get();
                }
                const altQuery = await db.collection("doctors").where("user_id", "==", userId).get();
                
                if (doctorQuery && !doctorQuery.empty) {
                    doctorQuery.forEach(async (doc) => { await db.collection("doctors").doc(doc.id).delete(); });
                }
                altQuery.forEach(async (doc) => { await db.collection("doctors").doc(doc.id).delete(); });

                alert(`تم حذف "${doctorName}" تماماً من السيستم وتحديث اللوحة بنجاح.`);
            } catch (error) {
                alert("حدث خطأ تقني أثناء عملية الحذف: " + error.message);
            }
        }

        // تشغيل الجلب التلقائي لأول مرة على المعلق
        listenToDoctorRequests();
    </script>
</body>
</html>
