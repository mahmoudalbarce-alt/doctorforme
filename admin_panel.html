<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة - تفعيل الأطباء</title>
    <style>
        :root {
            --primary-color: #2a85ff;
            --success-color: #2ecc71;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
        }

        .admin-container {
            max-width: 900px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; color: var(--primary-color); margin-bottom: 30px; }

        .welcome-msg { font-size: 18px; margin-bottom: 20px; color: #4a5568; }

        table {
            width: 100%; border-collapse: collapse; margin-top: 20px; text-align: right;
        }

        th, td { padding: 15px; border-bottom: 1px solid #edf2f7; }
        th { background-color: #f8fafc; color: #4a5568; }

        .badge {
            padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: inline-block;
        }
        .badge-pending { background-color: #fef3c7; color: #d97706; }

        .btn-approve {
            background-color: var(--success-color); color: white;
            padding: 8px 14px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold; font-size: 13px;
            transition: opacity 0.2s;
        }
        .btn-approve:hover { opacity: 0.9; }
        
        .no-data { text-align: center; padding: 30px; color: #718096; font-size: 16px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="welcome-msg">مرحباً، <strong id="adminName">الأدمن</strong> 👋</div>
        <h2>طلبات انضمام الأطباء المعلقة</h2>
        
        <table id="requestsTable">
            <thead>
                <tr>
                    <th>اسم الطبيب</th>
                    <th>رقم الهاتف</th>
                    <th>التخصص</th>
                    <th>عنوان العيادة</th>
                    <th>الحالة</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
        <div id="noDataMsg" class="no-data" style="display: none;">لا توجد طلبات تفعيل معلقة حالياً.</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

       <script>
     const firebaseConfig = {
    apiKey: "AIzaSyAzXXXXXXXXXXXXXXX", // دي الوحيدة اللي هتلاقيها مكتوبة واضحة أول ما تضغط على DoctorForMe Web
    authDomain: "doctorforme-62aaf.firebaseapp.com",
    projectId: "doctorforme-62aaf",
    storageBucket: "doctorforme-62aaf.appspot.com",
    messagingSenderId: "121506902078",
    appId: "1:121506902078:web:7f15e8da771bd973a96cef" // هتظهرلك كاملة لما تضغط على الويب
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // التأكد من أن الداخل هو الأدمن فعلاً
        const currentRole = localStorage.getItem('user_role');
        if (currentRole !== 'admin') {
            alert("عذراً، أنت لا تملك صلاحية لدخول هذه الصفحة!");
            window.location.href = 'login.html';
        } else {
            document.getElementById('adminName').innerText = localStorage.getItem('user_name') || 'الأدمن';
        }

        const tableBody = document.querySelector('#requestsTable tbody');
        const noDataMsg = document.getElementById('noDataMsg');

        // الاستماع للأطباء المعلقين لحظياً
        function listenToPendingDoctors() {
            db.collection("users")
              .where("role", "==", "doctor")
              .where("status", "==", "pending")
              .onSnapshot((snapshot) => {
                tableBody.innerHTML = '';
                
                if (snapshot.empty) {
                    noDataMsg.style.display = 'block';
                    document.getElementById('requestsTable').style.display = 'none';
                    return;
                }

                noDataMsg.style.display = 'none';
                document.getElementById('requestsTable').style.display = 'table';

                snapshot.forEach((doc) => {
                    const docData = doc.data();
                    const row = `
                        <tr>
                            <td>${docData.name}</td>
                            <td>${docData.phone}</td>
                            <td>${docData.specialty || 'غير محدد'}</td>
                            <td>${docData.address || 'غير محدد'}</td>
                            <td><span class="badge badge-pending">قيد المراجعة</span></td>
                            <td>
                                <button class="btn-approve" onclick="approveDoctor('${doc.id}', '${docData.name}', '${docData.specialty}', '${docData.address}')">موافقة وتفعيل</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            });
        }

        // دالة تفعيل حساب الدكتور ونقله لكولكشن الأطباء ليظهر للمرضى
        window.approveDoctor = async function(userId, name, specialty, address) {
            if(!confirm(`هل أنت متأكد من تفعيل حساب الدكتور: ${name}؟`)) return;

            try {
                // 1. تحديث حالته في كولكشن المستخدمين لـ active
                await db.collection("users").doc(userId).update({
                    status: 'active'
                });

                // 2. إضافته تلقائياً لكولكشن الـ doctors عشان يظهر للمرضى في البحث
                await db.collection("doctors").add({
                    name: "د. " + name,
                    specialty: specialty,
                    clinic_address: {
                        full_address: address,
                        map_url: ""
                    },
                    image_url: "https://via.placeholder.com/150", // صورة افتراضية لحين تحديثها
                    rating: "5.0",
                    working_days: ["السبت", "الأحد", "الإثنين"],
                    working_hours: { start: "14:00", end: "22:00" }
                });

                alert(`تم تفعيل حساب الدكتور ${name} بنجاح وإضافته لدليل الأطباء!`);

            } catch (error) {
                alert("حدث خطأ أثناء التفعيل: " + error.message);
            }
        }

        // تشغيل الجلب فوراً
        listenToPendingDoctors();
    </script>
</body>
</html>
